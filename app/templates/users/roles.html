{% extends "base.html" %}
{% block title %}الأدوار والصلاحيات{% endblock %}
{% block content %}
<div class="page-title">الأدوار والصلاحيات</div>
<div class="fiori-card">
    <table class="fiori-table">
        <thead><tr><th>الدور</th><th>الوصف</th><th>عدد المستخدمين</th><th class="no-print">إجراءات</th></tr></thead>
        <tbody>
        {% for r in roles %}
            <tr>
                <td>{{ r.name }}</td><td>{{ r.description or '-' }}</td><td>{{ r.users|length }}</td>
                <td class="no-print"><a href="{{ url_for('users.role_permissions', role_id=r.id) }}" class="btn btn-outline btn-sm">إدارة الصلاحيات</a></td>
            </tr>
        {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
