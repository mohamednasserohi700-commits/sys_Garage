{% extends "base.html" %}
{% block title %}مستخدم{% endblock %}
{% block content %}
<div class="page-title">{{ 'تعديل مستخدم' if user else 'مستخدم جديد' }}</div>
<form method="POST" class="fiori-card">
    <div class="form-grid">
        <div class="form-group"><label class="required">الاسم الكامل</label><input type="text" name="full_name" value="{{ user.full_name if user else '' }}" required></div>
        {% if not user %}
        <div class="form-group"><label class="required">اسم المستخدم</label><input type="text" name="username" required></div>
        {% endif %}
        <div class="form-group">
            <label {{ 'class=required' if not user }}>كلمة المرور {{ '(اتركه فارغًا لعدم التغيير)' if user else '' }}</label>
            <input type="password" name="password" {{ 'required' if not user }}>
        </div>
        <div class="form-group"><label>الهاتف</label><input type="text" name="phone" value="{{ user.phone if user else '' }}"></div>
        <div class="form-group"><label>البريد الإلكتروني</label><input type="email" name="email" value="{{ user.email if user else '' }}"></div>
        <div class="form-group">
            <label class="required">الدور</label>
            <select name="role_id" required>
                {% for r in roles %}
                <option value="{{ r.id }}" {{ 'selected' if user and user.role_id==r.id }}>{{ r.name }}</option>
                {% endfor %}
            </select>
        </div>
        {% if user %}
        <div class="form-group"><input type="checkbox" name="is_active_user" id="ia" {{ 'checked' if user.is_active_user }}> <label for="ia" style="display:inline">نشط</label></div>
        {% endif %}
    </div>
    <div class="mt-2">
        <button type="submit" class="btn btn-primary">حفظ</button>
        <a href="{{ url_for('users.list_users') }}" class="btn btn-outline">إلغاء</a>
    </div>
</form>
{% endblock %}
