{% extends "base.html" %}
{% block title %}فاتورة شراء جديدة{% endblock %}
{% block content %}
<div class="page-title">فاتورة شراء جديدة</div>
<form method="POST" class="fiori-card">
    <div class="form-grid">
        <div class="form-group">
            <label class="required">المورد</label>
            <select name="supplier_id" required>
                {% for s in suppliers %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label class="required">المخزن</label>
            <select name="warehouse_id" required>
                {% for w in warehouses %}<option value="{{ w.id }}">{{ w.name }}</option>{% endfor %}
            </select>
        </div>
        <div class="form-group"><label>الخصم</label><input type="number" step="0.01" name="discount" value="0"></div>
        <div class="form-group"><label>نسبة الضريبة %</label><input type="number" step="0.01" name="tax_percent" value="15"></div>
        <div class="form-group full"><label>ملاحظات</label><input type="text" name="notes"></div>
    </div>

    <hr>
    <strong>أصناف الفاتورة</strong>
    <div id="items-wrap" class="mt-2"></div>
    <button type="button" class="btn btn-outline btn-sm mt-2" onclick="addRow()">+ إضافة صنف</button>

    <div class="mt-2">
        <button type="submit" class="btn btn-primary">حفظ الفاتورة</button>
        <a href="{{ url_for('purchases.list_purchases') }}" class="btn btn-outline">إلغاء</a>
    </div>
</form>

<script>
const parts = [
    {% for p in parts %}{ id: {{ p.id }}, name: "{{ p.name|replace('"','') }}", price: {{ p.purchase_price }} },{% endfor %}
];

function addRow() {
    const wrap = document.getElementById('items-wrap');
    const row = document.createElement('div');
    row.className = 'parts-row-grid';
    let options = parts.map(p => `<option value="${p.id}" data-price="${p.price}">${p.name}</option>`).join('');
    row.innerHTML = `
        <div class="form-group"><label>القطعة</label><select name="part_id[]" onchange="this.nextElementSibling.nextElementSibling.querySelector('input').value=this.selectedOptions[0].dataset.price">${options}</select></div>
        <div class="form-group"><label>الكمية</label><input type="number" name="quantity[]" min="1" value="1" required></div>
        <div class="form-group"><label>سعر الشراء</label><input type="number" step="0.01" name="unit_price[]" value="${parts[0] ? parts[0].price : 0}" required></div>
        <div class="form-group"><button type="button" class="btn btn-danger btn-sm" onclick="this.closest('.parts-row-grid').remove()">حذف</button></div>
    `;
    wrap.appendChild(row);
}
addRow();
</script>
{% endblock %}
