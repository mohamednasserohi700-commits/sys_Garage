{% extends "base.html" %}
{% block title %}سند تحويل جديد{% endblock %}
{% block content %}
<div class="page-title">سند تحويل بين المخازن</div>
<form method="POST" class="fiori-card">
    <div class="form-grid">
        <div class="form-group">
            <label class="required">من مخزن</label>
            <select name="from_warehouse_id" required>{% for w in warehouses %}<option value="{{ w.id }}">{{ w.name }}</option>{% endfor %}</select>
        </div>
        <div class="form-group">
            <label class="required">إلى مخزن</label>
            <select name="to_warehouse_id" required>{% for w in warehouses %}<option value="{{ w.id }}">{{ w.name }}</option>{% endfor %}</select>
        </div>
        <div class="form-group full"><label>ملاحظات</label><input type="text" name="notes"></div>
    </div>
    <hr>
    <strong>الأصناف</strong>
    <div id="items-wrap" class="mt-2"></div>
    <button type="button" class="btn btn-outline btn-sm mt-2" onclick="addRow()">+ إضافة صنف</button>
    <div class="mt-2">
        <button type="submit" class="btn btn-primary">حفظ واعتماد التحويل</button>
        <a href="{{ url_for('transfers.list_transfers') }}" class="btn btn-outline">إلغاء</a>
    </div>
</form>
<script>
const parts = [{% for p in parts %}{ id: {{ p.id }}, name: "{{ p.name|replace('"','') }}" },{% endfor %}];
function addRow() {
    const wrap = document.getElementById('items-wrap');
    const row = document.createElement('div');
    row.className = 'parts-row-grid';
    let options = parts.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
    row.innerHTML = `
        <div class="form-group"><label>القطعة</label><select name="part_id[]">${options}</select></div>
        <div class="form-group"><label>الكمية</label><input type="number" name="quantity[]" min="1" value="1" required></div>
        <div class="form-group"><button type="button" class="btn btn-danger btn-sm" onclick="this.closest('.parts-row-grid').remove()">حذف</button></div>
    `;
    wrap.appendChild(row);
}
addRow();
</script>
{% endblock %}
