<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - نظام إدارة مركز الصيانة</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/fiori.css') }}">
</head>
<body>
    <div class="login-wrap">
        <div class="login-card">
            <h1>نظام إدارة مراكز صيانة السيارات </h1>
            <p class="sub">شركة النصر للمقاولات العمومية ورصف الطرق</p>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-box flash-{{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form method="POST">
                <div class="form-group mb-2">
                    <label class="required">اسم المستخدم</label>
                    <input type="text" name="username" required autofocus>
                </div>
                <div class="form-group mb-2">
                    <label class="required">كلمة المرور</label>
                    <input type="password" name="password" required>
                </div>
                <div class="login-checkbox">
                    <input type="checkbox" name="remember" id="remember">
                    <label for="remember" style="font-weight:400;">تذكرني</label>
                </div>
                <button type="submit" class="btn btn-primary">تسجيل الدخول</button>
            </form>
            <p class="text-muted" style="text-align:center;font-size:11.5px;margin-top:18px;">
                برمجة: محمد ناصر عبدالله | System_Makers 2026
            </p>
        </div>
    </div>
</body>
</html>
