{% extends "base.html" %}
{% block title %}تغيير كلمة المرور{% endblock %}
{% block content %}
<div class="page-title">تغيير كلمة المرور</div>
<form method="POST" class="fiori-card" style="max-width:420px;">
    <div class="form-group mb-2"><label class="required">كلمة المرور الحالية</label><input type="password" name="old_password" required></div>
    <div class="form-group mb-2"><label class="required">كلمة المرور الجديدة</label><input type="password" name="new_password" required></div>
    <div class="form-group mb-2"><label class="required">تأكيد كلمة المرور الجديدة</label><input type="password" name="confirm_password" required></div>
    <button type="submit" class="btn btn-primary">حفظ</button>
</form>
{% endblock %}
