{% extends "base.html" %}
{% block title %}مخزن{% endblock %}
{% block content %}
<div class="page-title">{{ 'تعديل مخزن' if warehouse else 'مخزن جديد' }}</div>
<form method="POST" class="fiori-card">
    <div class="form-grid">
        {% if not warehouse %}
        <div class="form-group"><label class="required">الكود</label><input type="text" name="code" required></div>
        {% endif %}
        <div class="form-group"><label class="required">الاسم</label><input type="text" name="name" value="{{ warehouse.name if warehouse else '' }}" required></div>
        <div class="form-group"><label>المسؤول</label><input type="text" name="manager_name" value="{{ warehouse.manager_name if warehouse else '' }}"></div>
        <div class="form-group full"><label>العنوان</label><input type="text" name="address" value="{{ warehouse.address if warehouse else '' }}"></div>
        {% if warehouse %}
        <div class="form-group"><input type="checkbox" name="is_active" id="ia" {{ 'checked' if warehouse.is_active }}> <label for="ia" style="display:inline">نشط</label></div>
        {% endif %}
    </div>
    <div class="mt-2">
        <button type="submit" class="btn btn-primary">حفظ</button>
        <a href="{{ url_for('warehouses.list_warehouses') }}" class="btn btn-outline">إلغاء</a>
    </div>
</form>
{% endblock %}
